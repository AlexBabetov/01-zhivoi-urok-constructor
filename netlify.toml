[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  REACT_APP_SUPABASE_URL = "https://wogcofceyeeouxokzpqy.supabase.co"
  REACT_APP_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvZ2NvZmNleWVlb3V4b2t6cHF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjUwNDEsImV4cCI6MjA4NzYwMTA0MX0.fWXd3TnEIyXEOE8USvTVbITHr6TqYe-2dtA51511Wc8"
  # Браузер обращается к Supabase через прокси на своём домене — без прямых запросов к supabase.co
  REACT_APP_SUPABASE_PROXY_URL = "https://urok360.koriphey.ru/_supabase"
  # Добавить в Netlify Dashboard → Site settings → Environment variables:
  # SUPABASE_URL              = https://wogcofceyeeouxokzpqy.supabase.co
  # SUPABASE_SERVICE_ROLE_KEY = <service_role key из Supabase Settings → API>
  # RESEND_API_KEY            = <API key из resend.com>
  # ADMIN_EMAIL               = babetov_aa@koriphey.ru  (опционально)

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."generate-lesson"]
  timeout = 30

[functions."save-lesson"]
  timeout = 15

[functions."notify-admin"]
  timeout = 10

[functions."list-pending-users"]
  timeout = 10

[functions."update-user-status"]
  timeout = 10

[functions."get-analytics"]
  timeout = 15

[functions."lessons"]
  timeout = 10

[functions."courses"]
  timeout = 10

# Редирект со старого Netlify-адреса на кастомный домен
[[redirects]]
  from = "https://constructor-zhivoi-urok.netlify.app/*"
  to = "https://urok360.koriphey.ru/:splat"
  status = 301
  force = true

# Прокси Supabase через свой домен — браузер не делает прямых запросов к supabase.co
# Это устраняет блокировку Supabase в РФ без VPN
[[redirects]]
  from = "/_supabase/*"
  to = "https://wogcofceyeeouxokzpqy.supabase.co/:splat"
  status = 200
  force = true

# Regular Functions: /api/* → netlify/functions/* (унифицированные пути для Netlify и Cloudflare)
[[redirects]]
  from = "/api/save-lesson"
  to = "/.netlify/functions/save-lesson"
  status = 200

[[redirects]]
  from = "/api/get-analytics"
  to = "/.netlify/functions/get-analytics"
  status = 200

[[redirects]]
  from = "/api/list-pending-users"
  to = "/.netlify/functions/list-pending-users"
  status = 200

[[redirects]]
  from = "/api/update-user-status"
  to = "/.netlify/functions/update-user-status"
  status = 200

[[redirects]]
  from = "/api/lessons"
  to = "/.netlify/functions/lessons"
  status = 200

[[redirects]]
  from = "/api/courses"
  to = "/.netlify/functions/courses"
  status = 200

# Edge Function: /api/generate-lesson → netlify/edge-functions/generate-lesson.js
[[edge_functions]]
  path = "/api/generate-lesson"
  function = "generate-lesson"

# SPA: все остальные → index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
