[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."generate-lesson"]
  timeout = 30

[functions."save-lesson"]
  timeout = 15

# Regular Function: /api/save-lesson → netlify/functions/save-lesson.js
[[redirects]]
  from = "/api/save-lesson"
  to = "/.netlify/functions/save-lesson"
  status = 200

# Edge Function: /api/generate-lesson → netlify/edge-functions/generate-lesson.js
[[edge_functions]]
  path = "/api/generate-lesson"
  function = "generate-lesson"

# SPA: все остальные → index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
