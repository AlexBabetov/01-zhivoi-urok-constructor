[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."generate-lesson"]
  timeout = 30

[edge_functions]
  directory = "netlify/edge-functions"

# Edge Function перехватывает /api/generate-lesson — стриминг без таймаутов
[[edge_functions]]
  path = "/api/generate-lesson"
  function = "generate-lesson"

# SPA: все остальные → index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
