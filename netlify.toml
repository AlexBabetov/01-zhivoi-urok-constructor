[build]
  command = "npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Редиректы: все запросы к /api/* → Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA: все остальные → index.html (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
